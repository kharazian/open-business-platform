name: ${COMPOSE_PROJECT_NAME:-open-business-platform}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_business_platform}
      POSTGRES_USER: ${POSTGRES_USER:-obp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-obp_dev_password}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obp} -d ${POSTGRES_DB:-open_business_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles:
      - api
    build:
      context: ./src/api
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-open-business-platform}-api:dev
    environment:
      APP_NAME: ${APP_NAME:-Open Business Platform}
      APP_ENV: ${APP_ENV:-Development}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5080
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-obp.auth}
      AUTH_COOKIE_REQUIRE_SECURE: ${AUTH_COOKIE_REQUIRE_SECURE:-false}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BRAND_LOGO_TEXT: ${BRAND_LOGO_TEXT:-OBP}
      DEFAULT_COMPANY_NAME: ${DEFAULT_COMPANY_NAME:-Your Company}
      DEFAULT_COMPANY_LOGO_URL: ${DEFAULT_COMPANY_LOGO_URL:-/logo.svg}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-http://localhost:5174/reset-password}
      PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-60}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@company.test}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Open Business Platform}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-open_business_platform}
      POSTGRES_USER: ${POSTGRES_USER:-obp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-obp_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VITE_APP_HOST: ${VITE_APP_HOST:-127.0.0.1}
      VITE_APP_PORT: ${VITE_APP_PORT:-5174}
    ports:
      - "${API_PORT:-5080}:5080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
