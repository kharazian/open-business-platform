server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /__web_health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
