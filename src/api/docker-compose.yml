  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5080
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-5080}:5080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
