name: Deploy Prod

on:
  workflow_dispatch:

concurrency:
  group: obp-server-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, obp-deploy]
    environment: prod
    defaults:
      run:
        working-directory: /opt/open-business-platform/prod
    steps:
      - name: Write prod env file on the server
        env:
          DEPLOY_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          if [ -z "${DEPLOY_ENV_FILE:-}" ]; then
            echo "PROD_ENV_FILE is empty; using the existing server env file."
            exit 0
          fi

          umask 077
          mkdir -p deploy/env
          printf '%s\n' "$DEPLOY_ENV_FILE" > deploy/env/prod.env

      - name: Deploy prod from source on the server
        run: |
          set -eu
          git fetch origin main
          git checkout main
          git merge --ff-only origin/main
          docker compose --profile migrate --env-file deploy/env/prod.env -f deploy/compose.yml -f deploy/compose.prod.yml -f deploy/compose.proxy.yml build
          docker compose --env-file deploy/env/prod.env -f deploy/compose.yml -f deploy/compose.prod.yml -f deploy/compose.proxy.yml up -d postgres redis
          docker compose --env-file deploy/env/prod.env -f deploy/compose.yml -f deploy/compose.prod.yml -f deploy/compose.proxy.yml stop api web
          docker compose --profile migrate --env-file deploy/env/prod.env -f deploy/compose.yml -f deploy/compose.prod.yml -f deploy/compose.proxy.yml run --rm migrator
          docker compose --env-file deploy/env/prod.env -f deploy/compose.yml -f deploy/compose.prod.yml -f deploy/compose.proxy.yml up -d --remove-orphans
          docker compose --env-file deploy/env/prod.env -f deploy/compose.yml -f deploy/compose.prod.yml -f deploy/compose.proxy.yml ps
