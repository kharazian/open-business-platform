name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/app/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore src/api/OpenBusinessPlatform.Api.csproj
      - run: dotnet run --project src/api.Tests/OpenBusinessPlatform.Api.Tests.csproj
      - run: dotnet build src/api/OpenBusinessPlatform.Api.csproj --configuration Release --no-restore

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render deployment Compose config
        run: docker compose --profile migrate --env-file deploy/env/stage.env.example -f deploy/compose.yml -f deploy/compose.stage.example.yml -f deploy/compose.proxy.yml config
      - name: Build API image
        run: docker build -t open-business-platform-api:ci src/api
      - name: Build API migrator image
        run: docker build --target migrator -t open-business-platform-api-migrator:ci src/api
      - name: Build web image
        run: docker build -t open-business-platform-web:ci src/app
