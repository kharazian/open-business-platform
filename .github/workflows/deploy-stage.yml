name: Deploy Stage

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: obp-server-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, obp-deploy]
    environment: stage
    defaults:
      run:
        working-directory: /opt/open-business-platform/stage
    steps:
      - name: Write stage env file on the server
        env:
          DEPLOY_ENV_FILE: ${{ secrets.STAGE_ENV_FILE }}
        run: |
          if [ -z "${DEPLOY_ENV_FILE:-}" ]; then
            echo "STAGE_ENV_FILE is empty; using the existing server env file."
            exit 0
          fi

          umask 077
          mkdir -p deploy/env
          printf '%s\n' "$DEPLOY_ENV_FILE" > deploy/env/stage.env

      - name: Deploy stage from source on the server
        run: |
          set -eu
          git fetch origin dev
          git checkout dev
          git merge --ff-only origin/dev
          docker compose --profile migrate --env-file deploy/env/stage.env -f deploy/compose.yml -f deploy/compose.stage.yml -f deploy/compose.proxy.yml build
          docker compose --env-file deploy/env/stage.env -f deploy/compose.yml -f deploy/compose.stage.yml -f deploy/compose.proxy.yml up -d postgres redis
          docker compose --env-file deploy/env/stage.env -f deploy/compose.yml -f deploy/compose.stage.yml -f deploy/compose.proxy.yml stop api web
          docker compose --profile migrate --env-file deploy/env/stage.env -f deploy/compose.yml -f deploy/compose.stage.yml -f deploy/compose.proxy.yml run --rm migrator
          docker compose --env-file deploy/env/stage.env -f deploy/compose.yml -f deploy/compose.stage.yml -f deploy/compose.proxy.yml up -d --remove-orphans
          docker compose --env-file deploy/env/stage.env -f deploy/compose.yml -f deploy/compose.stage.yml -f deploy/compose.proxy.yml ps
