# Local deployment-stack override.
# Use this with deploy/env/local.env.example when you want a production-like
# Docker stack on your laptop and the option to swap web/api containers for
# shell-run services.
services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-55440}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6385}:6379"

  api:
    ports:
      - "${API_PORT:-5080}:5080"

  proxy:
    extra_hosts:
      - "host.docker.internal:host-gateway"
