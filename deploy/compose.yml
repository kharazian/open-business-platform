name: ${COMPOSE_PROJECT_NAME:-open-business-platform}

x-api-environment: &api-environment
  APP_NAME: ${APP_NAME:-Open Business Platform}
  APP_ENV: ${APP_ENV:-Production}
  ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
  ASPNETCORE_URLS: http://+:5080
  AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-obp.auth}
  AUTH_COOKIE_REQUIRE_SECURE: ${AUTH_COOKIE_REQUIRE_SECURE:-true}
  BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?Set BOOTSTRAP_ADMIN_EMAIL in the environment file}
  BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?Set BOOTSTRAP_ADMIN_PASSWORD in the environment file}
  BRAND_LOGO_TEXT: ${BRAND_LOGO_TEXT:-OBP}
  DEFAULT_COMPANY_NAME: ${DEFAULT_COMPANY_NAME:-Your Company}
  DEFAULT_COMPANY_LOGO_URL: ${DEFAULT_COMPANY_LOGO_URL:-/logo.svg}
  PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-${PUBLIC_SCHEME:-https}://${PUBLIC_HOST:-localhost}/reset-password}
  PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-60}
  EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@company.test}
  EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Open Business Platform}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-open_business_platform}
  POSTGRES_USER: ${POSTGRES_USER:-obp}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the environment file}
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_business_platform}
      POSTGRES_USER: ${POSTGRES_USER:-obp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the environment file}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obp} -d ${POSTGRES_DB:-open_business_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  api:
    build:
      context: ../src/api
      dockerfile: Dockerfile
    image: ${API_IMAGE:-open-business-platform-api:local}
    restart: unless-stopped
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api-data-protection:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  migrator:
    build:
      context: ../src/api
      dockerfile: Dockerfile
      target: migrator
    image: ${API_MIGRATOR_IMAGE:-open-business-platform-api-migrator:local}
    profiles:
      - migrate
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app

  web:
    build:
      context: ../src/app
      dockerfile: Dockerfile
    image: ${WEB_IMAGE:-open-business-platform-web:local}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/__web_health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app

networks:
  app:

volumes:
  api-data-protection:
  postgres-data:
  redis-data:
