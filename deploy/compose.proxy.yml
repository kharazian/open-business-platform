services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PUBLIC_SCHEME: ${PUBLIC_SCHEME:-http}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      API_UPSTREAM: ${API_UPSTREAM:-api:5080}
      WEB_UPSTREAM: ${WEB_UPSTREAM:-web:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - type: bind
        source: ${CADDYFILE_PATH:-./proxy/Caddyfile.example}
        target: /etc/caddy/Caddyfile
        read_only: true
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app

volumes:
  caddy-data:
  caddy-config:
